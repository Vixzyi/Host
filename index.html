<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dark Fantasy 3D Game</title>
  <style>
    body, html { margin: 0; overflow: hidden; background: black; }
    canvas { display: block; }

    /* Joystick UI */
    #joystick-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 100px;
      height: 100px;
    }
  </style>
</head>
<body>
  <div id="joystick-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>

  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 10, 60);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5, 10, 7.5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.3)); // Tambahan agar tidak terlalu gelap

    // Ground
    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshStandardMaterial({color: 0x333333});
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Character (cube dulu)
    const charGeometry = new THREE.BoxGeometry(1, 1, 1);
    const charMaterial = new THREE.MeshStandardMaterial({color: 0xaa0000});
    const character = new THREE.Mesh(charGeometry, charMaterial);
    character.position.y = 0.5;
    scene.add(character);

    // Environment objek (batu/bangunan gelap)
    for (let i = 0; i < 20; i++) {
      const box = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1 + Math.random() * 3, 1),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
      );
      box.position.set(Math.random() * 60 - 30, 0.5, Math.random() * 60 - 30);
      scene.add(box);
    }

    // Joystick
    const joystick = nipplejs.create({
      zone: document.getElementById('joystick-container'),
      mode: 'static',
      position: { left: '60px', bottom: '60px' },
      color: 'white'
    });

    let moveX = 0, moveZ = 0;

    joystick.on('move', (evt, data) => {
      const angle = data.angle.radian;
      const distance = data.distance / 50;
      moveX = Math.sin(angle) * distance;
      moveZ = Math.cos(angle) * distance * -1;
    });

    joystick.on('end', () => {
      moveX = 0;
      moveZ = 0;
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Move character
      character.position.x += moveX * 0.1;
      character.position.z += moveZ * 0.1;

      // Camera follow
      camera.position.x = character.position.x;
      camera.position.z = character.position.z + 5;
      camera.lookAt(character.position);

      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
